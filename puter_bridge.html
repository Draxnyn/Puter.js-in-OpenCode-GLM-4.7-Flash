<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Puter → OpenCode Bridge</title>
<style>
  body{font:16px system-ui;max-width:760px;margin:3rem auto;padding:0 1rem;color:#18181b}
  #status{padding:1rem;background:#f4f4f5;border-radius:.5rem;white-space:pre-wrap}
  #sign-in{font:inherit;font-weight:600;padding:.7rem 1rem;border:0;border-radius:.5rem;background:#5b21b6;color:white;cursor:pointer}
  #sign-in:disabled{opacity:.6;cursor:wait}
  #account{color:#52525b}
  [hidden]{display:none!important}
</style>
<h1>Puter → OpenCode Bridge</h1>
<p id="status">Starting…</p>
<button id="sign-in" type="button">Sign in to Puter</button>
<p id="account" hidden></p>
<script src="https://js.puter.com/v2/"></script>
<script>
  const parameters = new URLSearchParams(location.search);
  const token = parameters.get('token');
  const status = document.querySelector('#status');
  const signInButton = document.querySelector('#sign-in');
  const account = document.querySelector('#account');
  const endpoint = location.origin;
  const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
  const requestedConcurrency = Number(parameters.get('concurrency'));
  const maxConcurrentRequests = Number.isInteger(requestedConcurrency)
    ? Math.min(8, Math.max(1, requestedConcurrency))
    : 2;
  let activeRequests = 0;
  let bridgeStarted = false;

  const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
  const errorText = error => error?.message || error?.msg || (typeof error === 'object' ? JSON.stringify(error) : String(error || 'Unknown error'));
  const isQuotaError = error => /\b(quota|rate[ -]?limit|too many requests?|resource exhausted|credits? exceeded)\b|\b429\b/i.test(errorText(error));

  async function prepareLocalFiles(request) {
    const temporaryPaths = [];
    const mediaURLs = [];
    let fileIndex = 0;
    const prompt = await Promise.all(request.prompt.map(async message => {
      if (!Array.isArray(message?.content)) return message;
      const content = await Promise.all(message.content.map(async part => {
        if (part?.type === 'bridge_media') {
          const blob = await fetch(part.data_url).then(response => response.blob());
          const uploaded = await puter.fs.write(
            `opencode-bridge-${request.id}-media-${fileIndex++}`,
            blob,
            { overwrite: true }
          );
          temporaryPaths.push(uploaded.path);
          mediaURLs.push(uploaded.path);
          return null;
        }
        if (part?.type !== 'local_file') return part;
        const blob = await fetch(part.data_url).then(response => response.blob());
        const safeName = String(part.name || 'document').replace(/[^a-zA-Z0-9._-]/g, '_');
        const uploaded = await puter.fs.write(
          `opencode-bridge-${request.id}-${fileIndex++}-${safeName}`,
          blob,
          { overwrite: true }
        );
        temporaryPaths.push(uploaded.path);
        return { type: 'file', puter_path: uploaded.path };
      }));
      return { ...message, content: content.filter(Boolean) };
    }));
    const mediaPrompt = prompt.map(message => {
      if (typeof message?.content === 'string') return message.content;
      if (!Array.isArray(message?.content)) return '';
      return message.content
        .filter(part => part?.type === 'text')
        .map(part => part.text || '')
        .join('\n');
    }).filter(Boolean).join('\n\n');
    return { prompt, temporaryPaths, mediaURLs, mediaPrompt };
  }

  async function removeTemporaryFiles(paths) {
    await Promise.allSettled(paths.map(path => puter.fs.delete(path)));
  }

  async function chatWithQuotaRetry(request, prepared) {
    let attempt = 0;
    for (;;) {
      try {
        if (prepared.mediaURLs.length) {
          return await puter.ai.chat(prepared.mediaPrompt, prepared.mediaURLs, false, {
            model: request.model,
            ...(request.options || {})
          });
        }
        return await puter.ai.chat(prepared.prompt, {
          model: request.model,
          ...(request.options || {})
        });
      } catch (error) {
        if (!isQuotaError(error)) throw error;
        attempt += 1;
        const delay = Math.min(30_000, 5_000 * 2 ** (attempt - 1));
        status.textContent = `Puter quota reached. Retrying this request in ${Math.ceil(delay / 1000)}s (${activeRequests}/${maxConcurrentRequests})…`;
        await wait(delay);
      }
    }
  }

  async function answer(request) {
    activeRequests += 1;
    status.textContent = `Querying ${request.model} (${activeRequests}/${maxConcurrentRequests})…`;
    let temporaryPaths = [];
    try {
      const prepared = await prepareLocalFiles(request);
      temporaryPaths = prepared.temporaryPaths;
      const result = await chatWithQuotaRetry(request, prepared);
      await fetch(`${endpoint}/answer`, { method: 'POST', headers,
        body: JSON.stringify({ id: request.id, result }) });
    } catch (error) {
      await fetch(`${endpoint}/answer`, { method: 'POST', headers,
        body: JSON.stringify({ id: request.id, error: errorText(error) }) });
    } finally {
      await removeTemporaryFiles(temporaryPaths);
      activeRequests -= 1;
      status.textContent = activeRequests
        ? `Processing ${activeRequests}/${maxConcurrentRequests} OpenCode requests…`
        : 'Connected. Waiting for OpenCode requests…';
    }
  }

  async function showAccount() {
    account.hidden = true;
    account.textContent = '';
    try {
      const user = await puter.auth.getUser();
      const name = user?.username || user?.email || user?.uuid;
      if (name) {
        account.textContent = `Signed in as ${name}`;
        account.hidden = false;
      }
    } catch (_) {}
    signInButton.textContent = puter.auth.isSignedIn()
      ? 'Switch Puter account'
      : 'Sign in to Puter';
  }

  async function runBridge() {
    if (bridgeStarted) return;
    bridgeStarted = true;
    await showAccount();
    status.textContent = `Connected. Up to ${maxConcurrentRequests} simultaneous OpenCode requests.`;
    for (;;) {
      try {
        if (activeRequests >= maxConcurrentRequests) {
          await wait(100);
          continue;
        }
        const response = await fetch(`${endpoint}/next`, { headers });
        if (!response.ok) throw new Error(`Bridge returned ${response.status}`);
        const { request } = await response.json();
        if (!request) continue;
        void answer(request);
      } catch (error) {
        status.textContent = 'Reconnecting: ' + (error.message || error);
        await wait(3000);
      }
    }
  }

  signInButton.addEventListener('click', async () => {
    signInButton.disabled = true;
    try {
      if (puter.auth.isSignedIn()) {
        status.textContent = 'Signing out of the current Puter account…';
        await puter.auth.signOut();
        account.hidden = true;
        account.textContent = '';
      }
      status.textContent = 'Waiting for Puter sign-in…';
      await puter.auth.signIn();
      if (bridgeStarted) {
        await showAccount();
        status.textContent = activeRequests
          ? `Processing ${activeRequests}/${maxConcurrentRequests} OpenCode requests…`
          : 'Connected. Waiting for OpenCode requests…';
      } else {
        await runBridge();
      }
    } catch (error) {
      status.textContent = 'Sign-in failed: ' + (error?.msg || error?.message || String(error));
    } finally {
      signInButton.disabled = false;
      await showAccount();
    }
  });

  async function initialize() {
    if (!token) {
      status.textContent = 'The URL is missing its bridge token.';
      return;
    }
    if (puter.auth.isSignedIn()) {
      await runBridge();
      return;
    }
    status.textContent = 'Sign in to Puter to connect the free AI models to OpenCode.';
    await showAccount();
  }

  initialize();
</script>
</html>
